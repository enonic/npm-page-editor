catalog:
    vite: npm:@voidzero-dev/vite-plus-core@^0.2.2
    vite-plus: ^0.2.2

overrides:
    vite: 'catalog:'

peerDependencyRules:
    allowAny:
        - vite
    allowedVersions:
        vite: '*'

allowBuilds:
    esbuild: false

ignoredBuiltDependencies:
    - '@tailwindcss/oxide'
    - esbuild
    - unrs-resolver

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
    - '@enonic/ui'
