name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  precheck:
    name: Verify tag points to master or version branches (x.y)
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.contains.outputs.allowed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check if tag commit is in allowed branches
        id: contains
        shell: bash
        run: |
          git fetch --quiet origin '+refs/heads/*:refs/remotes/origin/*' || true

          contains="$(git branch -r --contains "${GITHUB_SHA}" | sed 's/^[ *]*//')"

          echo "Branches containing the tag commit:"
          echo "${contains}"

          # Pre-release tags (containing '-') publish to the 'beta' dist-tag and
          # may be cut from any branch; stable tags must point to master or x.y.
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "Pre-release tag: allowed from any branch"
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          elif echo "${contains}" | grep -Eq '^origin/(main|master|[0-9]+\.[0-9]+)$'; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          else
            echo "allowed=false" >> "$GITHUB_OUTPUT"
          fi

  npm-publish:
    name: Publish to NPM
    needs: precheck
    if: needs.precheck.outputs.allowed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag/version mismatch: tag=$tag_version package.json=$pkg_version"
            exit 1
          fi
          echo "Tag and package.json version match: $pkg_version"

      - name: Publish
        # The build runs via the `prepublishOnly` lifecycle script (check + test + build + size).
        # --no-git-checks: CI runs in detached HEAD state (tag checkout).
        # --tag: pre-release tags (containing '-') publish to 'beta', stable tags to 'latest'.
        run: pnpm publish --no-git-checks --tag ${{ contains(github.ref_name, '-') && 'beta' || 'latest' }}

      - name: Create Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          name: Enonic Page Editor ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
